<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EmotionAI — Detection Dashboard</title>
  <link rel="stylesheet" href="style/app.css" />
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">😊</div>
    Emotion Analysis
  </div>
  <div class="topbar-right">
    <div class="live-badge" id="liveBadge">
      <div class="live-dot"></div> Live
    </div>
    <span id="topbarUser" style="font-size:13px;color:#94a3b8;margin-right:4px"></span>
    <button class="back-btn" onclick="history.back()">← Back</button>
    <button class="back-btn" onclick="Auth.logout()" style="margin-left:6px">Sign out</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP ROW -->
  <div class="top-row">

    <!-- CAMERA BLOCK -->
    <div class="camera-block">
      <div class="camera-wrap">
        <video id="videoFeed" autoplay muted playsinline></video>
        <div class="cam-overlay-top">
          <span class="live-tag" id="liveTag">● LIVE</span>
          <span class="ms-badge" id="msBadge" style="display:none">— ms</span>
        </div>
        <div class="detection-bar" id="detectionBar">Detected: Neutral 98% confidence</div>
      </div>

      <!-- BUTTONS -->
      <div class="btn-row" id="btnRow">
        <button class="btn btn-detect" id="btnDetect" onclick="doDetect()">
          🎯 Detect
        </button>
        <button class="btn btn-golive" id="btnGoLive" onclick="startLive()">
          📡 Go Live
        </button>
        <button class="btn btn-stop" id="btnStop" onclick="stopLive()" style="display:none">
          ⏹ Stop &amp; Report
        </button>
      </div>
      <div class="shortcut-hint">Space → detect &nbsp;|&nbsp; L → go live</div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <!-- Result -->
      <div class="panel-card">
        <div class="section-label">Result</div>
        <div class="result-main">
          <div class="result-dot" id="resultDot"></div>
          <div>
            <div class="result-emotion" id="resultEmotion">—</div>
            <div class="result-conf" id="resultConf">No detection yet</div>
          </div>
        </div>
      </div>

      <!-- All Probabilities -->
      <div class="panel-card">
        <div class="section-label">All Probabilities</div>
        <div id="probList"></div>
      </div>

      <!-- Session Timeline -->
      <div class="panel-card">
        <div class="section-label">Session Timeline</div>
        <div id="timelineDots"></div>
        <div id="timelineTag"></div>
      </div>

    </div>
  </div>

  <!-- EMOTION BREAKDOWN — now fully visible via scroll -->
  <div class="breakdown-section">
    <div class="breakdown-header">
      <span class="breakdown-title">Emotion breakdown</span>
      <span class="last-detected" id="lastDetected">No detection yet</span>
    </div>
    <div id="dominantCard" class="dominant-card empty">
      <span class="dom-placeholder">Run detection to see emotion breakdown</span>
    </div>
  </div>

</div>

<script src="script/auth.js"></script>
<script src="script/app.js?v=2"></script>
</body>
</html>
