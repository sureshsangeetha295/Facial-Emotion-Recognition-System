<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EmotionAI — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,300&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--panel:#fff;
  --accent:#e8440a;--accent-dim:rgba(232,68,10,0.08);--accent-glow:rgba(232,68,10,0.22);
  --grad:linear-gradient(135deg,#e8440a,#f59e4a);
  --text:#1a1612;--text2:#6b6560;--text3:#a8a29e;
  --border:#e2e0da;--border2:rgba(0,0,0,0.12);
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --green:#22c55e;--red:#dc2626;--yellow:#f59e0b;--blue:#3b82f6;
}
html,body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── TOPBAR ── */
.topbar{height:54px;display:flex;align-items:center;gap:16px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.logo-row{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.1rem;margin-right:auto;text-decoration:none;color:var(--text)}
.logo-box{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px var(--accent-glow)}
.admin-chip{background:var(--accent-dim);border:1px solid rgba(232,68,10,.2);color:var(--accent);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.04em}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-info{font-size:13px;color:var(--text2)}
.logout-btn{font-size:13px;font-weight:600;padding:7px 16px;border-radius:8px;background:none;border:1px solid var(--border2);cursor:pointer;color:var(--text2);font-family:var(--font-body);transition:all .15s}
.logout-btn:hover{background:#fee2e2;border-color:#fca5a5;color:var(--red)}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:20px 28px 0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
.stat-val{font-size:1.8rem;font-weight:800;color:var(--text);line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.stat-card.accent .stat-val{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── MAIN CONTENT ── */
.content{padding:20px 28px 40px}

/* ── TABLE TABS ── */
.table-tabs{display:flex;gap:4px;margin-bottom:16px;background:#eceae5;border-radius:10px;padding:4px;width:fit-content}
.ttab{padding:8px 18px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--text3);background:none;transition:all .15s;display:flex;align-items:center;gap:6px}
.ttab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.09)}
.ttab-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--accent-dim);color:var(--accent)}
.ttab.active .ttab-badge{background:var(--accent);color:#fff}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border2);border-radius:9px;font-size:13px;font-family:var(--font-body);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-input::placeholder{color:var(--text3)}
.filter-select{padding:9px 12px;border:1.5px solid var(--border2);border-radius:9px;font-size:13px;font-family:var(--font-body);color:var(--text2);background:var(--surface);outline:none;cursor:pointer;transition:border-color .15s}
.filter-select:focus{border-color:var(--accent)}
.refresh-btn{padding:9px 14px;border:1.5px solid var(--border2);border-radius:9px;background:var(--surface);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;font-family:var(--font-body);transition:all .15s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.count-badge{margin-left:auto;font-size:12px;color:var(--text3)}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:#f8f7f4;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody tr:hover{background:#faf9f7}
.data-table td{padding:11px 14px;color:var(--text);vertical-align:middle;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table td.wrap{white-space:normal;word-break:break-word}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}
.chip-admin{background:rgba(232,68,10,.1);color:var(--accent);border-color:rgba(232,68,10,.2)}
.chip-user{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
.chip-active{background:rgba(34,197,94,.1);color:#16a34a;border-color:rgba(34,197,94,.25)}
.chip-inactive{background:rgba(239,68,68,.08);color:var(--red);border-color:rgba(239,68,68,.2)}
.chip-emotion{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,68,10,.2)}
.chip-cat{background:#f0f9ff;color:#0369a1;border-color:#bae6fd}
.chip-star{color:var(--yellow)}

/* Delete btn */
.del-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.del-btn:hover{background:#fee2e2;border-color:#fca5a5;color:var(--red)}
.del-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.toggle-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.toggle-btn:hover{background:var(--accent-dim);border-color:rgba(232,68,10,.3);color:var(--accent)}
.toggle-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}

/* Empty / Loading */
.empty-row td{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading-row td{text-align:center;padding:32px;color:var(--text3)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pagination{display:flex;align-items:center;gap:6px;padding:14px 16px;border-top:1px solid var(--border);justify-content:flex-end;flex-wrap:wrap}
.page-btn{padding:5px 11px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--text2);transition:all .15s}
.page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:12px;color:var(--text3);margin-right:auto}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1612;color:#fff;font-size:13px;font-weight:500;padding:12px 18px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#15803d}
.toast.error{background:var(--red)}

/* Confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:28px 28px 24px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.18)}
.modal h3{font-family:var(--font-display);font-size:1.15rem;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-cancel{padding:9px 18px;border-radius:8px;border:1px solid var(--border2);background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);color:var(--text2)}
.modal-cancel:hover{background:var(--bg)}
.modal-confirm{padding:9px 18px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-body)}
.modal-confirm:hover{background:#b91c1c}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="/home" class="logo-row">
    <div class="logo-box"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="10" r="3"/><path d="M7 18a5 5 0 0 1 10 0"/></svg></div>
    EmotionAI
  </a>
  <span class="admin-chip">ADMIN</span>
  <div class="topbar-right">
    <span class="user-info" id="admin-name">—</span>
    <button class="logout-btn" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-row" id="stats-row">
  <div class="stat-card accent"><div class="stat-val" id="s-users">—</div><div class="stat-lbl">Total Users</div></div>
  <div class="stat-card"><div class="stat-val" id="s-detections">—</div><div class="stat-lbl">Detections</div></div>
  <div class="stat-card"><div class="stat-val" id="s-sessions">—</div><div class="stat-lbl">Sessions</div></div>
  <div class="stat-card"><div class="stat-val" id="s-feedback">—</div><div class="stat-lbl">Feedback</div></div>
  <div class="stat-card"><div class="stat-val" id="s-engagement">—</div><div class="stat-lbl">Avg Engagement</div></div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="table-tabs">
    <button class="ttab active" onclick="switchTable('users')" id="ttab-users">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users <span class="ttab-badge" id="badge-users">0</span>
    </button>
    <button class="ttab" onclick="switchTable('detections')" id="ttab-detections">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      Detections <span class="ttab-badge" id="badge-detections">0</span>
    </button>
    <button class="ttab" onclick="switchTable('feedback')" id="ttab-feedback">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Feedback <span class="ttab-badge" id="badge-feedback">0</span>
    </button>
    <button class="ttab" onclick="switchTable('sessions')" id="ttab-sessions">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Sessions <span class="ttab-badge" id="badge-sessions">0</span>
    </button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-input" placeholder="Search…" oninput="onSearch()"/>
    </div>
    <select class="filter-select" id="filter-select" onchange="onFilter()"><option value="">All</option></select>
    <button class="refresh-btn" onclick="loadTable()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
    <span class="count-badge" id="count-badge"></span>
  </div>

  <div class="table-wrap">
    <table class="data-table" id="data-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"><tr class="loading-row"><td colspan="10"><div class="spin"></div></td></tr></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Confirm Delete</h3>
    <p id="modal-body">This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-confirm-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const TOKEN = () => localStorage.getItem('ea_access_token');
let currentTable = 'users';
let allData = [];
let filteredData = [];
let page = 1;
const PAGE_SIZE = 20;   // 20 rows per page
let pendingDelete = null;

const HEADERS = {
  Authorization: () => ({ 'Authorization': 'Bearer ' + TOKEN() })
};

// ── Boot ──
async function boot() {
  if (!TOKEN()) { window.location.href = '/login'; return; }
  const me = await apiFetch('/auth/me');
  if (!me || !me.is_admin) { window.location.href = '/login'; return; }
  document.getElementById('admin-name').textContent = me.username;
  loadStats();
  loadTable();
}

async function apiFetch(url, opts={}) {
  try {
    const res = await fetch(url, { ...opts, headers: { ...(opts.headers||{}), ...HEADERS.Authorization() } });
    if (res.status === 401) { window.location.href = '/login?reason=session_expired'; return null; }
    return res.ok ? res.json() : null;
  } catch { return null; }
}

// ── Stats ──
async function loadStats() {
  const d = await apiFetch('/admin/stats');
  if (!d) return;
  document.getElementById('s-users').textContent = d.total_users ?? '—';
  document.getElementById('s-detections').textContent = d.total_detections ?? '—';
  document.getElementById('s-sessions').textContent = d.total_sessions ?? '—';
  document.getElementById('s-feedback').textContent = d.total_feedback ?? '—';
  document.getElementById('s-engagement').textContent = d.avg_engagement != null ? (d.avg_engagement*100).toFixed(1)+'%' : '—';
}

// ── Table switch ──
function switchTable(name) {
  currentTable = name;
  page = 1;
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active'));
  document.getElementById('ttab-'+name).classList.add('active');
  loadTable();
}

// ── Load table data ──
async function loadTable() {
  showLoading();
  const endpoints = {
    users:      '/admin/users',
    detections: '/admin/detections',
    feedback:   '/admin/feedback',
    sessions:   '/admin/sessions',
  };
  const data = await apiFetch(endpoints[currentTable]);
  allData = Array.isArray(data) ? data : [];

  // For detections and sessions: newest first (DESC by created_at / started_at).
  // The API already returns DESC, so index 0 = newest. We keep that order.
  // Badge shows total count from the full dataset.
  document.getElementById('badge-'+currentTable).textContent = allData.length;
  setupFilters();
  applyFilters();
}

// ── Filters ──
function setupFilters() {
  const sel = document.getElementById('filter-select');
  let options = [['', 'All']];
  if (currentTable === 'users')      options = [['','All'],['admin','Admin'],['user','User']];
  if (currentTable === 'detections') options = [['','All'],['Happiness','Happiness'],['Sadness','Sadness'],['Anger','Anger'],['Fear','Fear'],['Neutral','Neutral'],['Surprise','Surprise'],['Disgust','Disgust'],['webcam','Webcam'],['upload','Upload']];
  if (currentTable === 'feedback')   options = [['','All'],['General','General'],['Bug report','Bug report'],['Feature request','Feature request'],['Accuracy','Accuracy'],['Performance','Performance'],['UI / Design','UI / Design']];
  if (currentTable === 'sessions')   options = [['','All'],['webcam','Webcam'],['upload','Upload']];
  sel.innerHTML = options.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
}

function onSearch() { page=1; applyFilters(); }
function onFilter() { page=1; applyFilters(); }

function applyFilters() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const f = document.getElementById('filter-select').value.toLowerCase();
  filteredData = allData.filter(row => {
    const str = Object.values(row).join(' ').toLowerCase();
    if (q && !str.includes(q)) return false;
    if (!f) return true;
    if (currentTable==='users') {
      if (f==='admin') return row.is_admin;
      if (f==='user')  return !row.is_admin;
    }
    return str.includes(f);
  });
  document.getElementById('count-badge').textContent = `${filteredData.length} record${filteredData.length!==1?'s':''}`;
  renderTable();
  renderPagination();
}

// ── Render helpers ──
function showLoading() {
  document.getElementById('table-body').innerHTML = '<tr class="loading-row"><td colspan="10"><div class="spin"></div></td></tr>';
  document.getElementById('table-head').innerHTML = '';
  document.getElementById('pagination').innerHTML = '';
}

function fmt(v) {
  if (v==null) return '<span style="color:var(--text3)">—</span>';
  if (typeof v === 'boolean') return v ? '✓' : '✗';
  return String(v);
}
function fmtDate(s) {
  if (!s) return '<span style="color:var(--text3)">—</span>';
  try { return new Date(s).toLocaleString(); } catch { return s; }
}
function engBar(v) {
  if (v==null) return '—';
  const pct = Math.round(v*100);
  const col = pct>=70?'var(--green)':pct>=40?'var(--yellow)':'var(--red)';
  return `<div style="display:flex;align-items:center;gap:6px"><div style="flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;min-width:50px"><div style="height:100%;width:${pct}%;background:${col};border-radius:3px;transition:width .3s"></div></div><span style="font-size:11px;color:${col};font-weight:700">${pct}%</span></div>`;
}
function stars(n) {
  if (!n) return '—';
  return '★'.repeat(n)+'☆'.repeat(5-n);
}
function shortId(s) {
  if (!s) return '—';
  return `<span title="${s}" style="font-family:monospace;font-size:11px">${s.substring(0,8)}…</span>`;
}
const DEL_ICON = `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

// ── Render table ──
function renderTable() {
  const head = document.getElementById('table-head');
  const body = document.getElementById('table-body');
  // slice for current page — data is already sorted newest-first from API
  const slice = filteredData.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  if (currentTable === 'users') {
    head.innerHTML = `<tr><th>#</th><th>Username</th><th>Email</th><th>Role</th><th>Joined</th><th>Last Login</th><th>Actions</th></tr>`;
    body.innerHTML = slice.length === 0
      ? `<tr class="empty-row"><td colspan="7">No users found</td></tr>`
      : slice.map(r => `<tr>
          <td style="color:var(--text3)">${r.id}</td>
          <td><b>${r.username}</b></td>
          <td>${r.email}</td>
          <td><span class="chip ${r.is_admin?'chip-admin':'chip-user'}">${r.is_admin?'Admin':'User'}</span></td>
          <td>${fmtDate(r.created_at)}</td>
          <td>${fmtDate(r.last_login)}</td>
          <td>
            <div style="display:flex;gap:5px">
              <button class="toggle-btn" title="Toggle Admin" onclick="toggleAdmin(${r.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></button>
              <button class="del-btn" title="Delete user" onclick="askDelete('users',${r.id},'user &ldquo;${r.username}&rdquo;')">${DEL_ICON}</button>
            </div>
          </td>
        </tr>`).join('');
  }

  else if (currentTable === 'detections') {
    // Newest first: API returns ORDER BY created_at DESC so row[0] is newest.
    // Page 1 shows the most recent 20, page 2 shows older 20, etc.
    head.innerHTML = `<tr><th>#</th><th>User</th><th>Emotion</th><th>Confidence</th><th>Engagement</th><th>Source</th><th>Time</th><th>Del</th></tr>`;
    body.innerHTML = slice.length === 0
      ? `<tr class="empty-row"><td colspan="8">No detections found</td></tr>`
      : slice.map(r => `<tr>
          <td style="color:var(--text3)">${r.id}</td>
          <td>${r.username ?? (r.user_id ?? '—')}</td>
          <td><span class="chip chip-emotion">${r.emotion}</span></td>
          <td>${r.confidence!=null?Math.round(r.confidence*100)+'%':'—'}</td>
          <td>${engBar(r.engagement)}</td>
          <td><span class="chip chip-user">${r.source}</span></td>
          <td>${fmtDate(r.created_at)}</td>
          <td><button class="del-btn" onclick="askDelete('detections',${r.id},'detection #${r.id}')">${DEL_ICON}</button></td>
        </tr>`).join('');
  }

  else if (currentTable === 'feedback') {
    head.innerHTML = `<tr><th>#</th><th>Username</th><th>Rating</th><th>Category</th><th>Message</th><th>Time</th><th>Del</th></tr>`;
    body.innerHTML = slice.length === 0
      ? `<tr class="empty-row"><td colspan="7">No feedback yet</td></tr>`
      : slice.map(r => `<tr>
          <td style="color:var(--text3)">${r.id}</td>
          <td><b>${r.username ?? 'Guest'}</b></td>
          <td><span class="chip-star">${stars(r.rating)}</span></td>
          <td><span class="chip chip-cat">${r.category}</span></td>
          <td class="wrap" style="max-width:200px">${r.message}</td>
          <td>${fmtDate(r.created_at)}</td>
          <td><button class="del-btn" onclick="askDelete('feedback',${r.id},'feedback #${r.id}')">${DEL_ICON}</button></td>
        </tr>`).join('');
  }

  else if (currentTable === 'sessions') {
    head.innerHTML = `<tr><th>#</th><th>Session ID</th><th>User</th><th>Source</th><th>Dominant</th><th>Avg Engagement</th><th>Frames</th><th>Started</th><th>Del</th></tr>`;
    body.innerHTML = slice.length === 0
      ? `<tr class="empty-row"><td colspan="9">No sessions found</td></tr>`
      : slice.map(r => `<tr>
          <td style="color:var(--text3)">${r.id}</td>
          <td>${shortId(r.session_id)}</td>
          <td>${r.username ?? (r.user_id ?? '—')}</td>
          <td><span class="chip chip-user">${r.source}</span></td>
          <td><span class="chip chip-emotion">${r.dominant_emotion??'—'}</span></td>
          <td>${engBar(r.average_engagement)}</td>
          <td>${r.frame_count??'—'}</td>
          <td>${fmtDate(r.started_at)}</td>
          <td><button class="del-btn" onclick="askDelete('sessions',${r.id},'session #${r.id}')">${DEL_ICON}</button></td>
        </tr>`).join('');
  }
}

// ── Pagination ──
function renderPagination() {
  const total = Math.ceil(filteredData.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = `<span class="page-info">Page ${page} of ${total} &nbsp;·&nbsp; ${filteredData.length} records</span>`;
  html += `<button class="page-btn" onclick="goPage(1)" ${page<=1?'disabled':''}>« First</button>`;
  html += `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹ Prev</button>`;

  // Show up to 5 page buttons centred on current page
  const radius = 2;
  const start  = Math.max(1, page - radius);
  const end    = Math.min(total, page + radius);
  if (start > 1) html += `<span style="color:var(--text3);font-size:12px;padding:0 2px">…</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < total) html += `<span style="color:var(--text3);font-size:12px;padding:0 2px">…</span>`;

  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=total?'disabled':''}>Next ›</button>`;
  html += `<button class="page-btn" onclick="goPage(${total})" ${page>=total?'disabled':''}>Last »</button>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  page = p;
  renderTable();
  renderPagination();
  // Scroll table into view smoothly
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Delete flow ──
function askDelete(table, id, label) {
  pendingDelete = {table, id};
  document.getElementById('modal-title').textContent = 'Confirm Delete';
  document.getElementById('modal-body').textContent = `Delete ${label}? This action cannot be undone.`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); pendingDelete=null; }

async function confirmDelete() {
  if (!pendingDelete) return;
  const {table, id} = pendingDelete;
  closeModal();
  const urlMap = {
    users:      `/admin/users/${id}`,
    detections: `/admin/detections/${id}`,
    feedback:   `/admin/feedback/${id}`,
    sessions:   `/admin/sessions/${id}`,
  };
  const res = await fetch(urlMap[table], { method: 'DELETE', headers: HEADERS.Authorization() });
  if (res && res.ok) {
    showToast('Deleted successfully', 'success');
    loadStats();
    loadTable();
  } else {
    showToast('Delete failed', 'error');
  }
}

// ── Toggle admin ──
async function toggleAdmin(userId) {
  const res = await fetch(`/admin/users/${userId}/toggle-admin`, { method: 'PATCH', headers: HEADERS.Authorization() });
  if (res && res.ok) { showToast('Admin status updated', 'success'); loadTable(); loadStats(); }
  else showToast('Failed to update', 'error');
}

// ── Toast ──
let toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

// ── Logout ──
function doLogout() {
  localStorage.clear();
  window.location.href = '/login';
}

// ── Close modal on bg click ──
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

boot();
</script>
