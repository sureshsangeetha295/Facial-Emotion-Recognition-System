<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EngageAI - Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--surface:#fff;--elevated:#f4f2ef;
  --accent:#e8440a;--accent-glow:rgba(232,68,10,0.2);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;}
nav{height:60px;display:flex;align-items:center;padding:0 48px;gap:24px;background:rgba(250,249,247,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--font-display);font-weight:600;font-size:1.1rem;display:flex;align-items:center;gap:8px;margin-right:auto;text-decoration:none;color:var(--text)}
.logo-box{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center}
.btn-sm{font-size:13px;font-weight:600;padding:7px 18px;border-radius:99px;background:var(--accent);color:#fff;border:none;cursor:pointer;box-shadow:0 3px 10px var(--accent-glow)}
.page-wrap{max-width:560px;margin:0 auto;padding:80px 24px}
.page-header h1{font-family:var(--font-display);font-size:3rem;font-weight:600;letter-spacing:-0.02em}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}
.submit-btn{width:100%;padding:13px;border-radius:10px;background:var(--grad);color:#fff;font-weight:700;border:none;cursor:pointer}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <circle cx="12" cy="10" r="3"/><path d="M7 18a5 5 0 0 1 10 0"/>
      </svg>
    </div>
    EngageAI
  </a>
  <a href="app.html" class="btn-sm">Launch Live Monitor</a>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>Share your feedback</h1>
    <p>Your input helps us improve EngageAI for better student engagement monitoring.</p>
  </div>

  <div class="form-card">
    <textarea id="feedbackText" rows="8" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px" placeholder="How can we make EngageAI better for your online classes?"></textarea>
    <button onclick="submitFeedback()" class="submit-btn" style="margin-top:20px">Send Feedback</button>
  </div>
</div>

<script>
function submitFeedback(){
  const text = document.getElementById('feedbackText').value.trim();
  if(!text){
    alert("Please write something before submitting.");
    return;
  }
  alert("Thank you! Your feedback has been received.");
  document.getElementById('feedbackText').value = '';
}
</script>
</body>
</html>
